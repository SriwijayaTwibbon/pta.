<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twibbon Penerimaan Tamu Ambalan</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ===========================
NOTIFIKASI
=========================== -->

<div id="toast" class="toast">
    <div class="toast-box">
        <p id="toastText"></p>
        <button id="toastClose">OKE</button>
    </div>
</div>

<div id="downloadNotif" class="downloadNotif">
    Gambar berhasil didownload.<br>
    Terimakasih.
</div>

<!-- ===========================
SPLASH 1
=========================== -->

<section id="splash1" class="page splash active">

    <div class="splash-content">

        <img src="assets/logo1.png" class="logoSplash">

        <h1>SMK Sriwijaya</h1>

        <h3>Karangpucung</h3>

    </div>

</section>

<!-- ===========================
SPLASH 2
=========================== -->

<section id="splash2" class="page splash">

    <div class="splash-content">

        <img src="assets/logo2.png" class="logoSplash">

        <h1>Penerimaan Tamu Ambalan</h1>

        <h3>2026 / 2027</h3>

    </div>

</section>

<!-- ===========================
HEADER
=========================== -->

<header id="mainHeader">

    <img src="assets/logo1.png">

    <h2>Twibbon Penerimaan Tamu Ambalan</h2>

    <img src="assets/logo2.png">

</header>

<!-- ===========================
BERANDA
=========================== -->

<section id="home" class="page">

<div class="container">

<div class="card">

<p class="desc">

Buat Twibbon penerimaan tamu ambalan menggunakan foto terbaik kamu!

</p>

<div class="form-group">

<label>Pilih Kategori</label>

<select id="kategori">

<option value="">Pilih Peserta / Panitia</option>

<option value="peserta">Peserta</option>

<option value="panitia">Panitia</option>

</select>

</div>

<div class="form-group">

<label>Upload Gambar</label>

<input
type="file"
id="upload"
accept="image/*"
hidden>

<button id="btnUpload" class="btn">
Pilih Gambar
</button>

<p id="namaFile">
..........
</p>

</div>

</div>

</div>

</section>

<!-- ===========================
LOADING
=========================== -->

<section id="loadingPage" class="page">

<div class="loadingWrap">

<div class="loader"></div>

<h2>Memuat Data...</h2>

<p>
Mohon tunggu sebentar.
</p>

</div>

</section>

<!-- ===========================
EDITOR
=========================== -->

<section id="editorPage" class="page">

<div class="container">

<div class="editorCard">

<div id="canvasWrapper">

<canvas
id="canvas"
width="983"
height="1229">
</canvas>

</div>

<div class="editorButton">

<button id="zoomIn" class="btn">

Zoom In

</button>

<button id="zoomOut" class="btn">

Zoom Out

</button>

</div>

<div class="editorButton">

<button id="saveBtn" class="btn save">

Simpan

</button>

</div>

</div>

</div>

</section>

<!-- ===========================
SELESAI
=========================== -->

<section id="finishPage" class="page">

<div class="container">

<div class="finishCard">

<img
id="hasilImage">

<div class="finishButton">

<button
id="editAgain"
class="btn">

Edit

</button>

<button
id="downloadBtn"
class="btn">

Download

</button>

</div>

<div class="finishButton">

<button
id="homeBtn"
class="btn">

Ke Beranda

</button>

</div>

</div>

</div>

</section>

<!-- ===========================
FOOTER
=========================== -->

<footer>

Copyright SMK Sriwijaya 2026/2027

</footer>

<script src="script.js"></script>

</body>
</html>
